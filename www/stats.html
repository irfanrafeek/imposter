<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Impostor Games — Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Literata:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FBF8F3;
      --bg-soft: #f0e9dc;
      --card: #ffffff;
      --ink: #2a2520;
      --ink-soft: #8a7e6f;
      --ink-faint: #b8ab98;
      --accent-teal: #2f9e94;
      --accent-orange: #e88a3a;
      --accent-red: #d04a2f;
      --line: #ece3d2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 28px 20px 80px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap; margin-bottom: 18px;
    }
    h1 {
      font-family: 'Literata', Georgia, serif;
      font-size: 26px; margin: 0; letter-spacing: -0.3px;
    }
    button.refresh {
      font-family: inherit; font-weight: 600; font-size: 13px;
      color: var(--ink); background: var(--card);
      border: 1px solid var(--line); border-radius: 999px;
      padding: 9px 18px; cursor: pointer; transition: background .15s;
    }
    button.refresh:hover { background: var(--bg-soft); }
    button.refresh:disabled { opacity: .5; cursor: default; }

    /* range selector */
    .rangebar {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      background: var(--card); border: 1px solid var(--line);
      border-radius: 16px; padding: 12px 16px; margin-bottom: 8px;
    }
    .rangebar .rl { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-soft); }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      font-family: inherit; font-weight: 600; font-size: 14px;
      color: var(--ink-soft); background: transparent;
      border: 1px solid var(--line); border-radius: 999px;
      padding: 7px 16px; cursor: pointer; transition: all .12s;
    }
    .chip:hover { background: var(--bg-soft); }
    .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    /* Custom range: revealed under the chips only when 'Custom' is active. */
    .custom-range { display: none; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; padding-top: 12px; border-top: 1px dashed var(--line); width: 100%; }
    .custom-range.on { display: flex; }
    .custom-range label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-soft); }
    .custom-range input[type=date] {
      font-family: inherit; font-size: 14px; color: var(--ink);
      background: var(--bg-soft); border: 1px solid var(--line);
      border-radius: 10px; padding: 8px 12px; min-width: 150px;
    }
    .custom-range .hint { font-size: 12px; color: var(--ink-faint); }
    .updated { color: var(--ink-faint); font-size: 12px; margin: 0 0 24px 2px; letter-spacing: 0.3px; }

    /* stacked game sections */
    .game-title {
      font-family: 'Literata', Georgia, serif;
      font-size: 21px; font-weight: 600; letter-spacing: -0.2px;
      display: flex; align-items: center; gap: 14px;
      margin: 44px 0 16px;
    }
    .game-title::after { content: ''; flex: 1; height: 1px; background: var(--line); }
    section.game:first-of-type .game-title { margin-top: 8px; }

    .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
    .kpi {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 18px; padding: 20px 22px;
    }
    .kpi .label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-soft); }
    .kpi .big { font-family: 'Literata', serif; font-size: 42px; font-weight: 700; line-height: 1.05; margin: 8px 0 10px; }
    .kpi .sub { display: flex; gap: 22px; }
    .kpi .sub div { font-size: 13px; color: var(--ink-soft); }
    .kpi .sub b { display: block; font-size: 18px; color: var(--ink); font-weight: 700; }
    .kpi.games .big { color: var(--accent-teal); }
    .kpi.visits .big { color: var(--accent-orange); }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .panel {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 18px; padding: 20px 22px; margin-bottom: 16px;
    }
    .panel h2 {
      font-family: 'Literata', serif; font-size: 17px; margin: 0 0 16px;
      display: flex; align-items: baseline; justify-content: space-between;
    }
    .panel h2 .tot { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: var(--ink-faint); }

    /* daily bar chart */
    .chart { display: flex; align-items: flex-end; gap: 3px; height: 120px; }
    .chart .bar { flex: 1; min-width: 0; background: var(--accent-orange); border-radius: 3px 3px 0 0; transition: opacity .15s; position: relative; }
    .chart.g .bar { background: var(--accent-teal); }
    .chart .bar:hover { opacity: .7; }
    .chart .bar[data-v]:hover::after {
      content: attr(data-d) " · " attr(data-v);
      position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: #fff; font-size: 11px; white-space: nowrap;
      padding: 4px 8px; border-radius: 6px; margin-bottom: 6px; z-index: 5;
    }
    .chart-x { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-faint); margin-top: 8px; }

    /* ranked lists */
    .rows { display: flex; flex-direction: column; gap: 10px; }
    .row { display: grid; grid-template-columns: 1fr minmax(150px, 200px); align-items: center; gap: 12px; }
    .row .rlabel { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; min-width: 0; }
    .row .rlabel span.name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row .barwrap { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
    .row .track { position: relative; height: 22px; background: var(--bg-soft); border-radius: 6px; overflow: hidden; }
    .row .fill { position: absolute; inset: 0 auto 0 0; background: var(--accent-teal); opacity: .22; border-radius: 6px; }
    .row.v .fill { background: var(--accent-orange); }
    .row .rval { font-weight: 700; font-size: 14px; font-variant-numeric: tabular-nums; }
    .flag { font-size: 16px; line-height: 1; }

    .empty { color: var(--ink-faint); font-size: 13px; font-style: italic; padding: 6px 0; }
    .note { color: var(--ink-faint); font-size: 12px; text-align: center; margin-top: 30px; line-height: 1.6; }
    .err { background: #fdece9; border: 1px solid #f3c6bd; color: var(--accent-red); border-radius: 12px; padding: 14px 16px; font-size: 13px; margin-bottom: 20px; display: none; }
    @media (max-width: 640px) {
      .kpis, .grid2 { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
      .row { grid-template-columns: 1fr 120px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Impostor Games — Stats</h1>
      <button class="refresh" id="refresh">↻ Refresh</button>
    </header>

    <div class="rangebar">
      <span class="rl">Show last</span>
      <div class="chips" id="chips">
        <button class="chip" data-days="7">7 days</button>
        <button class="chip" data-days="14">14 days</button>
        <button class="chip" data-days="30">30 days</button>
        <button class="chip" data-days="90">90 days</button>
        <button class="chip" data-days="all">All time</button>
        <button class="chip" data-days="custom">Custom</button>
      </div>
      <div class="custom-range" id="custom-range">
        <label for="cr-from">From</label>
        <input type="date" id="cr-from" />
        <label for="cr-to">To</label>
        <input type="date" id="cr-to" />
        <span class="hint">Leave "To" blank for a single day</span>
      </div>
    </div>
    <div class="updated" id="updated">Loading…</div>

    <div class="err" id="err"></div>

    <!-- Sections (Dance / Word / Hub) are generated by the script below -->
    <div id="sections"></div>

    <div class="note">
      Cookie-free aggregate counts from your own database · reads <code>analytics/{music,word,hub}</code><br />
      “Visits” = app opens (per browser tab). “Games” = a 3+ player game started (every play/replay counts).
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDhDgQlJX8nM4IsGdEYNItHzZ2LjbIDIH0",
      authDomain: "imposter-20b85.firebaseapp.com",
      databaseURL: "https://imposter-20b85-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "imposter-20b85",
      storageBucket: "imposter-20b85.firebasestorage.app",
      messagingSenderId: "689271207746",
      appId: "1:689271207746:web:762f2f40b378e3a6d27adb",
    };

    // One section per analytics namespace, stacked top to bottom.
    // `items` is the per-round leaderboard key inside games/ (songs vs words);
    // hub has no games at all — visits panels only.
    const SECTIONS = [
      { key: 'music', title: 'Impostor Dance Game', hasGames: true, itemsKey: 'songs', itemsLabel: 'Top songs' },
      { key: 'word',  title: 'Impostor Word Game',  hasGames: true, itemsKey: 'words', itemsLabel: 'Top words' },
      { key: 'hub',   title: 'Hub landing page',    hasGames: false },
    ];

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getDatabase(app);

    const $ = id => document.getElementById(id);
    const fmt = n => (n || 0).toLocaleString('en-US');

    let DATA = null;          // cached analytics snapshot: { music, word, hub }
    let RANGE = 30;           // selected range: number of days, 'all', or 'custom'
    let CUSTOM = { from: '', to: '' };  // YYYY-MM-DD strings when RANGE === 'custom'

    // UTC day keys — must match how the apps write them (toISOString slice).
    function dayKey(d) { return d.toISOString().slice(0, 10); }
    function lastNDays(n) {
      const out = [];
      const now = new Date();
      for (let i = n - 1; i >= 0; i--) {
        const d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() - i));
        out.push(dayKey(d));
      }
      return out;
    }
    function flag(cc) {
      if (!cc || cc.length !== 2) return '🏳️';
      return cc.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // Enumerate every UTC day-key between two YYYY-MM-DD strings (inclusive).
    // If `to` is blank, treats as a single-day range.
    function daysBetween(from, to) {
      if (!from) return [];
      const end = to || from;
      if (end < from) return [];
      const out = [];
      const start = new Date(from + 'T00:00:00Z');
      const stop = new Date(end + 'T00:00:00Z');
      for (let d = new Date(start); d <= stop; d.setUTCDate(d.getUTCDate() + 1)) {
        out.push(dayKey(d));
      }
      return out;
    }

    // The set of day-keys the current range covers, oldest → newest.
    // For 'all', use every day present across this section's daily nodes.
    function rangeDays(data) {
      if (RANGE === 'custom') return daysBetween(CUSTOM.from, CUSTOM.to);
      if (RANGE !== 'all') return lastNDays(RANGE);
      const set = new Set();
      for (const seg of ['visits', 'games']) {
        const daily = (data[seg] && data[seg].daily) || {};
        for (const d in daily) set.add(d);
      }
      return [...set].sort();
    }

    // Sum a scalar key (e.g. 'count') across the given days.
    function sumScalar(daily, days, key) {
      let s = 0;
      for (const d of days) {
        const node = daily && daily[d];
        if (node && typeof node[key] === 'number') s += node[key];
      }
      return s;
    }
    // Merge a per-day sub-map (countries/categories/songs/words) across the given days.
    function sumMap(daily, days, sub) {
      const acc = {};
      for (const d of days) {
        const node = daily && daily[d] && daily[d][sub];
        if (node) for (const k in node) acc[k] = (acc[k] || 0) + node[k];
      }
      return acc;
    }

    // ---- static skeleton -------------------------------------------------
    // Element ids are prefixed with the section key: music-v-total, word-g-chart…
    function buildSections() {
      $('sections').innerHTML = SECTIONS.map(s => {
        const k = s.key;
        const visitsKpi = `
          <div class="kpi visits">
            <div class="label">${s.hasGames ? 'App visits' : 'Page visits'} · <span class="rangelabel">last 30 days</span></div>
            <div class="big" id="${k}-v-total">–</div>
            <div class="sub">
              <div>Today<b id="${k}-v-today">–</b></div>
              <div>Per-day avg<b id="${k}-v-avg">–</b></div>
            </div>
          </div>`;
        const gamesKpi = s.hasGames ? `
          <div class="kpi games">
            <div class="label">Games played · <span class="rangelabel">last 30 days</span></div>
            <div class="big" id="${k}-g-total">–</div>
            <div class="sub">
              <div>Today<b id="${k}-g-today">–</b></div>
              <div>Per-day avg<b id="${k}-g-avg">–</b></div>
            </div>
          </div>` : '';
        const charts = s.hasGames ? `
          <div class="grid2">
            <div class="panel">
              <h2>Visits per day <span class="tot" id="${k}-v-chart-tot"></span></h2>
              <div class="chart" id="${k}-v-chart"></div>
              <div class="chart-x" id="${k}-v-chart-x"></div>
            </div>
            <div class="panel">
              <h2>Games per day <span class="tot" id="${k}-g-chart-tot"></span></h2>
              <div class="chart g" id="${k}-g-chart"></div>
              <div class="chart-x" id="${k}-g-chart-x"></div>
            </div>
          </div>
          <div class="grid2">
            <div class="panel">
              <h2>Visits by country</h2>
              <div class="rows" id="${k}-v-countries"></div>
            </div>
            <div class="panel">
              <h2>Games by country <span class="tot">host location</span></h2>
              <div class="rows" id="${k}-g-countries"></div>
            </div>
          </div>
          <div class="panel">
            <h2>Top categories <span class="tot">by games played</span></h2>
            <div class="rows" id="${k}-categories"></div>
          </div>
          <div class="panel">
            <h2>${s.itemsLabel} <span class="tot">by games played</span></h2>
            <div class="rows" id="${k}-items"></div>
          </div>` : `
          <div class="grid2">
            <div class="panel">
              <h2>Visits per day <span class="tot" id="${k}-v-chart-tot"></span></h2>
              <div class="chart" id="${k}-v-chart"></div>
              <div class="chart-x" id="${k}-v-chart-x"></div>
            </div>
            <div class="panel">
              <h2>Visits by country</h2>
              <div class="rows" id="${k}-v-countries"></div>
            </div>
          </div>`;
        return `
          <section class="game" id="sec-${k}">
            <h2 class="game-title">${s.title}</h2>
            <div class="kpis">${visitsKpi}${gamesKpi}</div>
            ${charts}
          </section>`;
      }).join('');
    }

    function renderChart(el, xEl, totEl, daily, days) {
      const vals = days.map(d => (daily && daily[d] && daily[d].count) || 0);
      const max = Math.max(1, ...vals);
      el.innerHTML = days.map((d, i) => {
        const v = vals[i];
        const h = v === 0 ? 2 : Math.max(4, Math.round((v / max) * 100));
        return `<div class="bar" style="height:${h}%" data-v="${v}" data-d="${d.slice(5)}"></div>`;
      }).join('');
      xEl.innerHTML = days.length
        ? `<span>${days[0].slice(5)}</span><span>${days[days.length - 1].slice(5)}</span>`
        : '';
      if (totEl) totEl.textContent = fmt(vals.reduce((a, b) => a + b, 0)) + ' total';
    }

    function renderRanked(el, obj, cls, opts = {}) {
      const entries = Object.entries(obj || {}).sort((a, b) => b[1] - a[1]).slice(0, opts.limit || 12);
      if (!entries.length) { el.innerHTML = '<div class="empty">No data in this range yet.</div>'; return; }
      const max = Math.max(...entries.map(e => e[1]));
      el.innerHTML = entries.map(([k, v]) => {
        const pct = Math.max(3, Math.round((v / max) * 100));
        const label = opts.flag
          ? `<span class="flag">${flag(k)}</span><span class="name">${k}</span>`
          : `<span class="name">${escapeHtml(k)}</span>`;
        return `<div class="row ${cls}">
          <div class="rlabel">${label}</div>
          <div class="barwrap">
            <div class="track"><div class="fill" style="width:${pct}%"></div></div>
            <div class="rval">${fmt(v)}</div>
          </div>
        </div>`;
      }).join('');
    }

    // Render one section for the current RANGE from cached DATA.
    function renderSection(s) {
      const k = s.key;
      const data = (DATA && DATA[k]) || {};
      const visits = data.visits || {};
      const games = data.games || {};
      const vDaily = visits.daily || {};
      const gDaily = games.daily || {};
      const days = rangeDays(data);
      const today = dayKey(new Date());
      const isAll = RANGE === 'all';
      const nDays = Math.max(1, days.length);
      const avg = t => (t / nDays).toFixed(t / nDays >= 10 ? 0 : 1);

      const vTotal = isAll ? (visits.total || 0) : sumScalar(vDaily, days, 'count');
      $(k + '-v-total').textContent = fmt(vTotal);
      $(k + '-v-today').textContent = fmt(vDaily[today] && vDaily[today].count);
      $(k + '-v-avg').textContent = avg(vTotal);

      // Charts — for 'all', cap to the last 90 present days so bars stay readable
      const chartDays = isAll ? days.slice(-90) : days;
      renderChart($(k + '-v-chart'), $(k + '-v-chart-x'), $(k + '-v-chart-tot'), vDaily, chartDays);
      const vCountries = isAll ? (visits.countries || {}) : sumMap(vDaily, days, 'countries');
      renderRanked($(k + '-v-countries'), vCountries, 'v', { flag: true });

      if (!s.hasGames) return;

      const gTotal = isAll ? (games.total || 0) : sumScalar(gDaily, days, 'count');
      $(k + '-g-total').textContent = fmt(gTotal);
      $(k + '-g-today').textContent = fmt(gDaily[today] && gDaily[today].count);
      $(k + '-g-avg').textContent = avg(gTotal);

      renderChart($(k + '-g-chart'), $(k + '-g-chart-x'), $(k + '-g-chart-tot'), gDaily, chartDays);
      const gCountries = isAll ? (games.countries || {}) : sumMap(gDaily, days, 'countries');
      const cats = isAll ? (games.categories || {}) : sumMap(gDaily, days, 'categories');
      const items = isAll ? (games[s.itemsKey] || {}) : sumMap(gDaily, days, s.itemsKey);
      renderRanked($(k + '-g-countries'), gCountries, 'g', { flag: true });
      renderRanked($(k + '-categories'), cats, 'g');
      renderRanked($(k + '-items'), items, 'g', { limit: 15 });
    }

    function render() {
      if (!DATA) return;
      let rangeLabel;
      if (RANGE === 'all') rangeLabel = 'all time';
      else if (RANGE === 'custom') {
        if (!CUSTOM.from) rangeLabel = 'custom range';
        else if (!CUSTOM.to || CUSTOM.to === CUSTOM.from) rangeLabel = CUSTOM.from;
        else rangeLabel = CUSTOM.from + ' → ' + CUSTOM.to;
      } else rangeLabel = `last ${RANGE} days`;
      document.querySelectorAll('.rangelabel').forEach(e => e.textContent = rangeLabel);
      SECTIONS.forEach(renderSection);
    }

    async function load() {
      const btn = $('refresh');
      btn.disabled = true;
      $('err').style.display = 'none';
      $('updated').textContent = 'Loading…';
      try {
        // One read covers all three namespaces (music/word/hub).
        const snap = await get(ref(db, 'analytics'));
        DATA = snap.val() || {};
        render();
        $('updated').textContent = 'Updated ' + new Date().toLocaleString();
      } catch (e) {
        const msg = (e && e.message) || String(e);
        const err = $('err');
        err.style.display = 'block';
        if (/permission|denied/i.test(msg)) {
          err.innerHTML = 'Could not read analytics — the database rule for <code>analytics</code> is <code>.read: false</code>. Deploy the updated rules to allow this dashboard to read the counters.';
        } else {
          err.textContent = 'Error loading stats: ' + msg;
        }
        $('updated').textContent = 'Load failed';
      } finally {
        btn.disabled = false;
      }
    }

    // Range chips
    function setRange(days, chip) {
      if (days === 'custom') {
        RANGE = 'custom';
        // Seed empty pickers with today so the user sees a sensible default.
        if (!CUSTOM.from) CUSTOM.from = dayKey(new Date());
        $('cr-from').value = CUSTOM.from;
        $('cr-to').value = CUSTOM.to;
        $('custom-range').classList.add('on');
      } else {
        RANGE = days === 'all' ? 'all' : parseInt(days, 10);
        $('custom-range').classList.remove('on');
      }
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === chip));
      render(); // instant — no re-fetch needed
    }
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => setRange(chip.dataset.days, chip));
      if (chip.dataset.days === '30') chip.classList.add('active'); // default
    });
    // Live-update on date input changes; only re-render if Custom is active.
    ['cr-from', 'cr-to'].forEach(id => $(id).addEventListener('change', () => {
      CUSTOM.from = $('cr-from').value;
      CUSTOM.to = $('cr-to').value;
      if (RANGE === 'custom') render();
    }));

    $('refresh').addEventListener('click', load);
    buildSections();
    load();
  </script>
</body>
</html>
